name: Close linked issue on merge to develop

on:
  pull_request_target:
    types: [closed]
    branches: [develop]

# A PR can only be merged once — concurrency is a safety net against retries.
concurrency:
  group: close-issue-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  close-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // closingIssuesReferences (GraphQL) only works when the PR targets
            // the default branch. Since we merge into `develop`, we parse the
            // PR body directly for closing keywords instead.
            const body = context.payload.pull_request.body || '';
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = [...new Set(
              [...body.matchAll(pattern)].map(m => parseInt(m[1], 10))
            )];

            if (issueNumbers.length === 0) {
              console.log('No closing keywords found in PR body.');
              return;
            }

            for (const number of issueNumbers) {
              console.log(`Closing issue #${number}`);
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                state: 'closed',
                state_reason: 'completed'
              });
            }
