name: Link issue to PR from branch name

on:
  pull_request_target:
    types: [opened, reopened]

# One run per PR — no need to stack concurrent runs for the same PR.
concurrency:
  group: link-issue-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  link-issue:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    steps:
      - uses: actions/github-script@v7
        with:
          # PROJECT_TOKEN (classic PAT, "project" scope) is required for
          # project mutations. It also covers repo read/write for the
          # REST calls below.
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const PROJECT_OWNER = 'biralavor';
            const PROJECT_NUMBER = 14;

            // ── 1. Extract issue number from branch name ───────────────────────
            const branch = context.payload.pull_request.head.ref;
            const match = branch.match(/^(\d+)-/);
            if (!match) {
              console.log(`Branch "${branch}" does not start with an issue number — skipping.`);
              return;
            }

            const issueNumber = parseInt(match[1], 10);
            console.log(`Branch prefix → issue #${issueNumber}`);

            // ── 2. Verify the issue exists and is open ─────────────────────────
            let issue;
            try {
              const response = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });
              issue = response.data;
            } catch (err) {
              console.log(`Issue #${issueNumber} not found (${err.status}) — skipping.`);
              return;
            }

            if (issue.pull_request) {
              console.log(`#${issueNumber} is a pull request, not an issue — skipping.`);
              return;
            }

            if (issue.state !== 'open') {
              console.log(`Issue #${issueNumber} is already ${issue.state} — skipping.`);
              return;
            }

            // ── 3. Append closing keyword to PR body if not already present ────
            const body = context.payload.pull_request.body || '';
            const alreadyLinked = new RegExp(
              `(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)[\\s:()]*#${issueNumber}\\b`, 'i'
            ).test(body);

            if (alreadyLinked) {
              console.log(`PR body already references #${issueNumber}.`);
            } else {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: body + `\n\nCloses #${issueNumber}`,
              });
              console.log(`Appended "Closes #${issueNumber}" to PR #${context.payload.pull_request.number}`);
            }

            // ── 4. Resolve project ID + Status field ───────────────────────────
            const projectQuery = await github.graphql(`
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { login: PROJECT_OWNER, number: PROJECT_NUMBER });

            const project = projectQuery.user?.projectV2;
            if (!project) {
              console.log(`Project #${PROJECT_NUMBER} not found — skipping status update.`);
              return;
            }
            const projectId = project.id;

            const statusField = project.fields.nodes.find(f => f.name === 'Status' && f.options);
            if (!statusField) {
              console.log('Status field not found in project — skipping status update.');
              return;
            }

            const inReviewOption = statusField.options.find(o => o.name === 'In review');
            if (!inReviewOption) {
              console.log('"In review" option not found in Status field — skipping status update.');
              return;
            }

            // ── 5. Add the issue to the project (idempotent) ──────────────────
            const issueNodeId = issue.node_id;
            const addResult = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `, { projectId, contentId: issueNodeId });

            const itemId = addResult.addProjectV2ItemById.item.id;
            console.log(`Issue #${issueNumber} project item ID: ${itemId}`);

            // ── 6. Set issue status → "In review" ─────────────────────────────
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `, {
              projectId,
              itemId,
              fieldId: statusField.id,
              optionId: inReviewOption.id,
            });

            console.log(`Issue #${issueNumber} status set to "In review"`);
